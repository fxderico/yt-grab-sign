name: Sign YT Grab Shortcut

on:
  workflow_dispatch: {}

jobs:
  sign:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify input file exists
        run: |
          set -euo pipefail
          if [ ! -f "drafts/YT Grab.xml" ]; then
            echo "::error::drafts/YT Grab.xml not found. Nothing to sign."
            exit 1
          fi

      - name: Convert plist XML to binary plist
        run: |
          set -euo pipefail
          plutil -convert binary1 "drafts/YT Grab.xml" -o "YT Grab.unsigned.shortcut"

      - name: Diagnose shortcuts sign options
        run: |
          shortcuts --help || true
          echo "---"
          shortcuts sign --help || true
          echo "---"
          defaults read MobileMeAccounts 2>&1 || true

      - name: Sign shortcut
        run: |
          set -euo pipefail
          shortcuts sign --mode anyone --input "YT Grab.unsigned.shortcut" --output "YT Grab.shortcut"

      - name: Verify signed output exists and is non-empty
        run: |
          set -euo pipefail
          if [ ! -s "YT Grab.shortcut" ]; then
            echo "::error::YT Grab.shortcut was not produced or is empty."
            exit 1
          fi

      - name: Upload signed shortcut artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-grab-shortcut
          path: YT Grab.shortcut
          if-no-files-found: error
